<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Kartoteki OWP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen" onload="initSystem()">

    <header class="border-b border-slate-800 bg-slate-950 p-4 sticky top-0 z-50 shadow-md">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="p-2 bg-red-600/20 text-red-500 rounded-lg border border-red-500/30">
                    <i data-lucide="shield-alert" class="w-6 h-6"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold tracking-wider text-slate-200">OGNIWO WYWIADOWCZO-PATROLOWE</h1>
                    <p class="text-xs text-slate-400 font-mono">Baza Danych Połączona z Botem Discord</p>
                </div>
            </div>
            <div class="text-right font-mono text-xs text-slate-400">
                STATUS API: <span id="api-status" class="text-red-500">ROZŁĄCZONO</span>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4 space-y-6">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <div class="bg-slate-950 p-4 rounded-xl border border-slate-800 flex items-center justify-between">
                <div>
                    <p class="text-xs text-slate-400 uppercase font-mono">Wszyscy Obywatele</p>
                    <p class="text-2xl font-bold mt-1 text-slate-200" id="stat-total">0</p>
                </div>
                <i data-lucide="folder-open" class="text-slate-600 w-8 h-8"></i>
            </div>
            <div class="bg-slate-950 p-4 rounded-xl border border-slate-800 flex items-center justify-between">
                <div>
                    <p class="text-xs text-slate-400 uppercase font-mono">Poszukiwani</p>
                    <p class="text-2xl font-bold mt-1 text-red-500" id="stat-wanted">0</p>
                </div>
                <i data-lucide="user-x" class="text-red-500/50 w-8 h-8"></i>
            </div>
            <div class="bg-slate-950 p-4 rounded-xl border border-slate-800 flex items-center justify-between">
                <div>
                    <p class="text-xs text-slate-400 uppercase font-mono">Podejrzani</p>
                    <p class="text-2xl font-bold mt-1 text-amber-500" id="stat-suspects">0</p>
                </div>
                <i data-lucide="eye" class="text-amber-500/50 w-8 h-8"></i>
            </div>
            <div class="bg-slate-950 p-4 rounded-xl border border-slate-800 flex items-center justify-between">
                <div>
                    <p class="text-xs text-slate-400 uppercase font-mono">Zatrzymani 48h</p>
                    <p class="text-2xl font-bold mt-1 text-emerald-500" id="stat-detained">0</p>
                </div>
                <i data-lucide="lock" class="text-emerald-500/50 w-8 h-8"></i>
            </div>
        </div>

        <div class="bg-slate-950 p-4 rounded-xl border border-slate-800 flex flex-col md:flex-row gap-4 justify-between items-center">
            <div class="relative w-full md:w-96">
                <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500">
                    <i data-lucide="search" class="w-5 h-5"></i>
                </span>
                <input type="text" id="searchInput" oninput="renderCards()" placeholder="Szukaj po nazwisku, PESEL..." class="w-full pl-10 pr-4 py-2 bg-slate-900 border border-slate-800 rounded-lg text-slate-200 placeholder-slate-500 focus:outline-none focus:border-slate-700 font-mono text-sm">
            </div>
            <div class="flex gap-2 w-full md:w-auto overflow-x-auto">
                <button onclick="filterStatus('all')" class="px-3 py-1.5 bg-slate-800 hover:bg-slate-700 text-xs font-mono rounded-md text-slate-200 transition">WSZYSTKO</button>
                <button onclick="filterStatus('POSZUKIWANY')" class="px-3 py-1.5 bg-red-950/40 text-xs font-mono rounded-md text-red-400 border border-red-900/50">POSZUKIWANI</button>
                <button onclick="filterStatus('PODEJRZANY')" class="px-3 py-1.5 bg-amber-950/40 text-xs font-mono rounded-md text-amber-400 border border-amber-900/50">PODEJRZANI</button>
                <button onclick="filterStatus('ZATRZYMANY (48H)')" class="px-3 py-1.5 bg-emerald-950/40 text-xs font-mono rounded-md text-emerald-400 border border-emerald-900/50">ZATRZYMANI</button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="cardsGrid"></div>
    </main>

    <script>
        // TUTAJ WKLEJASZ SWÓJ LINK Z RENDERA Z DODANYM /api NA KOŃCU:
        const API_URL = "https://owp-backend.onrender.com/api";
        
        let localData = [];
        let currentFilter = 'all';

        async function initSystem() {
            try {
                const statsRes = await fetch(`${API_URL}/stats`);
                const stats = await statsRes.json();
                document.getElementById('stat-total').innerText = stats.total;
                document.getElementById('stat-wanted').innerText = stats.wanted;
                document.getElementById('stat-suspects').innerText = stats.suspects;
                document.getElementById('stat-detained').innerText = stats.detained;

                const dataRes = await fetch(`${API_URL}/kartoteka`);
                localData = await dataRes.json();
                
                document.getElementById('api-status').innerText = "POŁĄCZONO";
                document.getElementById('api-status').className = "text-emerald-400 animate-pulse";
                
                renderCards();
            } catch (err) {
                console.error(err);
                document.getElementById('cardsGrid').innerHTML = `<p class="text-red-500 font-mono text-center col-span-full">Błąd połączenia z API. Serwer Render potrzebuje ok. 1 minuty na wybudzenie.</p>`;
            }
        }

        function filterStatus(status) {
            currentFilter = status;
            renderCards();
        }

        function renderCards() {
            const grid = document.getElementById('cardsGrid');
            const search = document.getElementById('searchInput').value.toLowerCase();
            grid.innerHTML = "";

            const filtered = localData.filter(item => {
                const matchSearch = `${item.imie} ${item.nazwisko} ${item.pesel}`.toLowerCase().includes(search);
                const matchStatus = currentFilter === 'all' || item.status === currentFilter;
                return matchSearch && matchStatus;
            });

            filtered.forEach(item => {
                let statusColor = "bg-slate-500/10 text-slate-400 border-slate-500/30";
                if (item.status === "POSZUKIWANY") statusColor = "bg-red-500/10 text-red-500 border-red-500/30";
                if (item.status === "PODEJRZANY") statusColor = "bg-amber-500/10 text-amber-500 border-amber-500/30";
                if (item.status === "ZATRZYMANY (48H)") statusColor = "bg-emerald-500/10 text-emerald-500 border-emerald-500/30";

                let dowodyTxt = item.dowody && item.dowody.length > 0 
                    ? item.dowody.map(d => `• ${d.sygnatura}: ${d.opis}`).join('\n') 
                    : "Brak zabezpieczonych dowodów.";

                const card = document.createElement('div');
                card.className = "bg-slate-950 border border-slate-800 rounded-xl overflow-hidden hover:border-slate-700 transition";
                card.innerHTML = `
                    <div class="p-4 border-b border-slate-800 bg-slate-900/50 flex justify-between items-center">
                        <span class="text-xs font-mono text-slate-500">PESEL: ${item.pesel}</span>
                        <span class="px-2 py-0.5 border text-[10px] font-mono tracking-wider uppercase font-bold ${statusColor}">${item.status}</span>
                    </div>
                    <div class="p-5 space-y-4">
                        <div>
                            <h3 class="text-lg font-bold text-slate-200">${item.nazwisko} ${item.imie}</h3>
                            <p class="text-xs font-mono text-slate-400 mt-1">Adnotacje służbowe:</p>
                            <div class="bg-slate-900 p-2 rounded text-xs font-mono border border-slate-800 text-slate-300 mt-1 whitespace-pre-line">
                                ${item.notatka_tajna || "Brak uwag."}
                            </div>
                        </div>
                        <div>
                            <p class="text-xs font-mono text-slate-400">Zabezpieczone dowody:</p>
                            <p class="text-[11px] font-mono text-slate-500 italic whitespace-pre-line">${dowodyTxt}</p>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
            lucide.createIcons();
        }
    </script>
</body>
</html>
